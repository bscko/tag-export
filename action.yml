name: 'Bit Tag and Export'
description: 'Persist Bit Soft Tags and Export to Remote Scope'
branding:
  icon: 'upload-cloud'
  color: 'purple'
inputs:
  ws-dir:
    description: "Workspace json file directory path"
    required: false
  build:
    description: "Build the components"
    required: false
  strict:
    description: "Strict mode"
    required: false
  increment:
    description: "Type of increment"
    required: false
    options:
      - major
      - premajor
      - minor
      - preminor
      - patch
      - prepatch
      - prerelease
  prerelease-id:
    description: "Pre-release identifier"
    required: false
  increment-by:
    description: "Increment by"
    required: false
  skip-push:
    description: 'Skip pushing the changes to the remote repository (useful when CI handles the push separately)'
    required: false
runs:
  using: 'node20'
  main: 'dist/index.js'
